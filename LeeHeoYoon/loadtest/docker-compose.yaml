services:
  loadtest:
    image: golang:1.24-bookworm
    container_name: loadtest
    working_dir: /work/src
    volumes:
      - ./src:/work/src
    stdin_open: true
    tty: true
    command: "bash -c 'tail -f /dev/null'"
    cpus: "4.0"
    mem_limit: 8g
    restart: unless-stopped
    networks:
      - server-net

networks:
  server-net:
    external: true
    name: docker_default
