worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log info;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30s;
    keepalive_requests 1000;

    # 최대 업로드 크기: 300MB (Spring multipart 설정과 일치)
    client_max_body_size 300M;

    client_body_buffer_size 256k;
    client_body_temp_path /tmp/nginx-body 1 2;

    # non-root temp paths
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        text/plain
        text/css
        application/javascript
        application/xml;
    gzip_vary on;
    gzip_proxied any;

    upstream spring_app {
        server app:8080;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # UI 페이지 프록시
        location /ui {
            proxy_pass http://spring_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        location /api/ {
            proxy_pass http://spring_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 300s;
            client_body_timeout 300s;

            # 업로드 대역폭 제한: 128MB/s per client
            limit_rate 128m;
        }

        # 업로드 크기 초과 시 JSON 에러 응답
        error_page 413 /api/error/file-too-large;

        # Option B: Direct-to-disk upload
        location /upload/ {
            # Nginx가 request body를 storage 볼륨에 직접 저장
            client_body_in_file_only on;
            client_body_temp_path /data/storage/.nginx-tmp 1 2;
            client_body_buffer_size 16k;
            client_max_body_size 300M;
            client_body_timeout 300s;

            # internal callback으로 전달 (rewrite로 고정 경로 전달)
            rewrite ^ /internal/upload-callback break;
            proxy_pass http://spring_app;
            proxy_set_header X-File-Path $request_body_file;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Upload-Secret "OptionB_Shared_Secret_2026";

            # body를 Spring Boot로 전달하지 않음
            proxy_pass_request_body off;
            proxy_set_header Content-Length 0;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # 업로드 대역폭 제한: 128MB/s per client
            limit_rate 128m;
            proxy_read_timeout 30s;
        }

        # Internal callback 보호 -- 외부 직접 접근 차단
        location /internal/ {
            internal;
            proxy_pass http://spring_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        # Internal file serving (X-Accel-Redirect)
        location /storage-internal/ {
            internal;
            gzip off;
            alias /data/storage/;

            types { }
            default_type application/octet-stream;

            etag on;
            if_modified_since exact;
            add_header Cache-Control "private, max-age=3600";

            # 대용량 동시 다운로드 시 worker 블로킹 방지
            aio threads;
            directio 1m;
            sendfile on;
            tcp_nopush on;

            # 다운로드 대역폭: X-Accel-Limit-Rate 헤더로 동적 제어
            # Spring Boot가 요청별로 속도를 결정하며, 기본값은 128MB/s
            limit_rate_after 1m;
            limit_rate 128m;
        }
    }
}
