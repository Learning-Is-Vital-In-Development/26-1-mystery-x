spring:
  application:
    name: mystorage

  datasource:
    url: jdbc:mysql://localhost:3306/mystorage
    username: root
    password: root_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

storage:
  base-dir: data/storage/uploads
